services:
  db:
    image: postgres:16-alpine
    container_name: worldcup_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-worldcup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-worldcup123}
      POSTGRES_DB: ${POSTGRES_DB:-worldcupdb}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcup -d worldcupdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: worldcup_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-worldcup}:${POSTGRES_PASSWORD:-worldcup123}@db:5432/${POSTGRES_DB:-worldcupdb}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: worldcup_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
