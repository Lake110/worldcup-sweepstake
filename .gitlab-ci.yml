stages:
  - lint

variables:
  SECRET_KEY: test-secret-key-for-ci
  ALGORITHM: HS256

# ── Frontend lint (TypeScript) ───────────────────────────────────────────────
frontend-lint:
  stage: lint
  image: node:20-alpine
  before_script:
    - cd frontend
    - npm install
  script:
    - npx tsc --noEmit
  only:
    - merge_requests
    - main
